# Conservative heavy-atom constraints safe to use as simultaneous (AND) Boltz contacts.
# Merge the `constraints` list into the Boltz input YAML and run Boltz-2 with potentials enabled.
constraints:
- atom_contact:
    atom1: [A, 85, CB]
    atom2: [B, 12, CG1]
    max_distance: 5.640001
    force: true
- atom_contact:
    atom1: [A, 144, CG2]
    atom2: [B, 8, CB]
    max_distance: 7.54
    force: true
- atom_contact:
    atom1: [A, 144, CG2]
    atom2: [B, 12, CG1]
    max_distance: 8.24
    force: true
