name: scientific benchmark gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test]" -c ci-constraints.txt
      - name: Unit and regression tests
        run: python -m pytest -q
      - name: Fail-closed paired-format corpus
        run: >-
          python validation/benchmark_corpus.py benchmark/input
          --output-directory "${{ runner.temp }}/nmr2boltz-benchmark"
          --reviewed-baseline benchmark/reviewed_baseline.json
